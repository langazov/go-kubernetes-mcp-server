version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - revive
    - gocritic
    - misspell
    - unconvert
    - prealloc

formatters:
  enable:
    - gofmt
    - goimports

settings:
  goimports:
    local-prefixes:
      - github.com/langazov/go-kubernetes-mcp-server

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gocritic, prealloc]
